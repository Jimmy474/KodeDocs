<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodeDocs Design Preview</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <div class="main-container">
        <header class="site-header">
            <div class="brand">
                <a class="brand-container" href="/" aria-label="KodeDocs home">
                    <span class="brand-logo"></span>
                    <span class="brand-mark"></span>
                    <span class="brand-text"></span>
                </a>
            </div>

            <div class="header-content">
                <button class="icon-button nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" data-panel-toggle="nav">
                    <span class="menu-icon"><span></span></span>
                </button>

                <nav class="top-nav" aria-label="Primary navigation">
                    <!-- Loaded dynamically -->
                </nav>

                <div class="controls">
                    <label class="select-shell version-select" aria-label="Version">
                        <select id="versionSelect"></select>
                    </label>

                    <label class="select-shell lang-select" aria-label="Language">
                        <select id="langSelect">
                            <option value="en" selected>EN</option>
                        </select>
                    </label>

                    <button class="icon-button" type="button" aria-label="Toggle theme" onclick="toggleTheme()">
                        <span class="theme-icon"></span>
                    </button>

                </div>

                <button class="icon-button controls-toggle" type="button" aria-label="Open controls" aria-expanded="false" data-controls-toggle>
                    <span class="menu-icon"><span></span></span>
                </button>
            </div>

        </header>
        <div class="collapsed-rail" aria-label="Page navigation">
            <button class="rail-button rail-nav-toggle" type="button" aria-expanded="false" data-panel-toggle="nav">Menu</button>
            <div class="rail-toc">
                <button class="rail-button" type="button">On this page</button>
                <div class="rail-toc-popover" data-rail-toc></div>
            </div>
        </div>
        <nav class="sidebar" data-panel="nav" aria-label="Documentation navigation">
            <div class="sidebar-inner">
                <!-- Loaded dynamically -->
            </div>
        </nav>
        <div class="docs-layout">
            <main class="docs-content kd-doc">
                <p class="doc-kicker">KodeDocs</p>
                <h1>Loading documentation...</h1>
                <p class="lead">The documentation shell is preparing the selected version, language, and page.</p>
            </main>

            <aside class="right-sidebar" data-panel="toc" aria-label="On this page">
                <div class="toc-inner">
                    <!-- Loaded dynamically -->
                </div>
            </aside>
        </div>
    </div>

    <div class="mobile-backdrop" aria-hidden="true"></div>
    <script src="/assets/script.js"></script>
    <script>
        (function() {
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const wsUrl = protocol + window.location.host + '/livereload';
            let ws;
            function connect() {
                ws = new WebSocket(wsUrl);

                ws.onmessage = function(event) {
                    if (event.data === 'reload') {
                        const url = new URL(window.location.href);
                        url.searchParams.set('reloadTime', `${Date.now()}`);
                        window.location.href = url.toString();
                    }
                };

                ws.onclose = function() {
                    setTimeout(connect, 2000);
                };
            }

            connect();
        })();
    </script>
</body>
</html>
